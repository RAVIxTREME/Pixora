{% extends 'base.html' %}
{% block content %}
<h5 class="mb-4 fw-bold">Explore 🔥</h5>
{% if posts %}
<div class="row g-1">
  {% for post in posts %}
  <div class="col-4">
    <a href="{% url 'post_detail' post.id %}">
      <img src="{{ post.image.url }}" class="grid-post"/>
    </a>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="text-center py-5">
  <i class="fa fa-camera fa-3x text-muted mb-3"></i>
  <p class="text-muted">No posts yet!</p>
</div>
{% endif %}
{% endblock %}
