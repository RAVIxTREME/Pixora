<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pixora</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #111 !important; border-bottom: 1px solid #222; }
    .navbar-brand { font-weight: 800; font-size: 1.5rem; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-link { color: #ccc !important; }
    .nav-link:hover { color: #fff !important; }
    .card { background: #161616; border: 1px solid #222; border-radius: 12px; }
    .card-header { background: #1a1a1a; border-bottom: 1px solid #222; }
    .btn-primary { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); border: none; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-outline-light { border-color: #444; color: #ccc; }
    .btn-outline-light:hover { background: #222; color: #fff; }
    .form-control { background: #1e1e1e; border: 1px solid #333; color: #e0e0e0; }
    .form-control:focus { background: #1e1e1e; border-color: #bc1888; color: #fff; box-shadow: none; }
    .post-card { max-width: 470px; margin: 0 auto 24px; }
    .post-image { width: 100%; object-fit: cover; max-height: 600px; }
    .like-btn { background: none; border: none; color: #ccc; font-size: 1.3rem; cursor: pointer; }
    .like-btn.liked { color: #e0245e; }
    .like-btn:hover { color: #e0245e; }
    .comment-btn { background: none; border: none; color: #ccc; font-size: 1.3rem; cursor: pointer; }
    .profile-pic { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #333; display:inline-flex; align-items:center; justify-content:center; }
    .profile-pic-lg { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #bc1888; background: #333; display:flex; align-items:center; justify-content:center; }
    .grid-post { aspect-ratio: 1; object-fit: cover; width: 100%; cursor: pointer; transition: opacity 0.2s; }
    .grid-post:hover { opacity: 0.7; }
    a { color: #bc1888; text-decoration: none; }
    a:hover { color: #f09433; }
    .text-muted { color: #666 !important; }
  </style>
</head>
<body>
{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="{% url 'home' %}">Pixora</a>
    <div class="d-flex gap-3 align-items-center">
      <a href="{% url 'explore' %}" class="nav-link"><i class="fa fa-compass"></i></a>
      <a href="{% url 'create_post' %}" class="nav-link"><i class="fa fa-plus-square"></i></a>
      <a href="{% url 'profile' request.user.username %}" class="nav-link"><i class="fa fa-user"></i></a>
      <a href="{% url 'logout' %}" class="nav-link"><i class="fa fa-sign-out-alt"></i></a>
    </div>
  </div>
</nav>
{% endif %}
<div class="container py-4">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
