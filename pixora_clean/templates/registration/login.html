{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card">
      <div class="card-header fw-bold text-center fs-5">Login to Pixora 📸</div>
      <div class="card-body">
        <form method="POST">
          {% csrf_token %}
          {% if form.errors %}
          <div class="alert alert-danger">Username ya password galat hai!</div>
          {% endif %}
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required/>
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <div class="text-center mt-3">
          <a href="{% url 'register' %}">New here? Register</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
